name: Profile assets

on:
  workflow_dispatch:
  schedule:
    - cron: "18 3 * * *"
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "assets/workbench.svg"
      - "assets/recent-work.svg"
      - "assets/tools.svg"
      - "assets/profile-state.json"

permissions:
  contents: write
  actions: read
  issues: read
  pull-requests: read

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate profile SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: python scripts/generate_profile_assets.py

      - name: Commit generated assets
        run: |
          if [ -z "$(git status --porcelain -- assets/workbench.svg assets/recent-work.svg assets/tools.svg assets/profile-state.json)" ]; then
            echo "No profile changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/workbench.svg assets/recent-work.svg assets/tools.svg assets/profile-state.json
          git commit -m "chore: update profile assets"
          git push
